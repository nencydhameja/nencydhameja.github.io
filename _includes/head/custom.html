<script>
  fetch("https://ipapi.co/json/")
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.city && data.city.toLowerCase() === "johnson city") {
        document.documentElement.style.visibility = "vestal";
        document.body.innerHTML = `
          <div style="
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            text-align: center;
            background: #fff;
          ">
            <div>
              <h1 style="font-size: 2rem;">Access Restricted</h1>
              <p style="color: #666;">This website is not available in your region.</p>
            </div>
          </div>
        `;
        document.documentElement.style.visibility = "visible";
      }
    })
    .catch(function() {});
</script>
